name: Publish Github Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v1.2)'
        required: true
        default: 'v1.2'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Release Keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "ERROR: KEYSTORE_BASE64 secret is not configured. Keystore is required for release publishing."
            exit 1
          fi
          echo "Decoding release keystore..."
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Generate Changelog
        run: |
          # Fetch all tags to retrieve history
          git fetch --tags --unshallow || git fetch --tags
          
          # Determine current tag
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CURRENT_TAG="${{ github.event.inputs.tag_name }}"
          else
            CURRENT_TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "Current tag to compare: $CURRENT_TAG"
          
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^$CURRENT_TAG$" | head -n 1)
          echo "Previous tag: $PREV_TAG"
          
          echo "### Changelog (since last release)" > changelog.txt
          echo "" >> changelog.txt
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous release tag found. Listing all commits:"
            git log --oneline --pretty=format:"* %s (%h)" >> changelog.txt
          elif git rev-parse "$CURRENT_TAG" >/dev/null 2>&1; then
            echo "Listing commits between $PREV_TAG and $CURRENT_TAG:"
            git log $PREV_TAG..$CURRENT_TAG --oneline --pretty=format:"* %s (%h)" >> changelog.txt
          else
            echo "Tag $CURRENT_TAG not pushed yet. Listing commits from $PREV_TAG to HEAD:"
            git log $PREV_TAG..HEAD --oneline --pretty=format:"* %s (%h)" >> changelog.txt
          fi
          
          echo "Generated changelog:"
          cat changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          body_path: changelog.txt
          files: |
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
