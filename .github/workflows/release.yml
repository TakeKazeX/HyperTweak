name: Publish Github Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v1.2)'
        required: true
        default: 'v1.2'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Release Keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "ERROR: KEYSTORE_BASE64 secret is not configured. Keystore is required for release publishing."
            exit 1
          fi
          echo "Decoding release keystore..."
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Generate Changelog
        run: |
          # Fetch all tags to retrieve history
          git fetch --tags --unshallow || git fetch --tags
          
          # Determine current tag
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CURRENT_TAG="${{ github.event.inputs.tag_name }}"
          else
            CURRENT_TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "Current tag to compare: $CURRENT_TAG"
          
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^$CURRENT_TAG$" | head -n 1)
          echo "Previous tag: $PREV_TAG"
          
          # Determine commit range
          if [ -z "$PREV_TAG" ]; then
            COMMIT_RANGE=""
          elif git rev-parse "$CURRENT_TAG" >/dev/null 2>&1; then
            COMMIT_RANGE="$PREV_TAG..$CURRENT_TAG"
          else
            COMMIT_RANGE="$PREV_TAG..HEAD"
          fi

          if [ -z "$COMMIT_RANGE" ]; then
            echo "No previous release tag found or checking full history."
            git log --oneline --pretty=format:"%s (%h)" > raw_commits.txt
          else
            echo "Listing commits for range: $COMMIT_RANGE"
            git log $COMMIT_RANGE --oneline --pretty=format:"%s (%h)" > raw_commits.txt
          fi

          touch feats.txt fixes.txt perfs.txt refactors.txt docs.txt builds.txt others.txt

          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi
            prefix=$(echo "$line" | grep -oE "^[a-zA-Z0-9_-]+(\([^)]+\))?:")
            if [ -n "$prefix" ]; then
              type=$(echo "$prefix" | grep -oE "^[a-zA-Z0-9_-]+")
              case "$type" in
                feat)
                  echo "* $line" >> feats.txt
                  ;;
                fix)
                  echo "* $line" >> fixes.txt
                  ;;
                perf)
                  echo "* $line" >> perfs.txt
                  ;;
                refactor|style)
                  echo "* $line" >> refactors.txt
                  ;;
                docs)
                  echo "* $line" >> docs.txt
                  ;;
                build|ci|chore)
                  echo "* $line" >> builds.txt
                  ;;
                *)
                  echo "* $line" >> others.txt
                  ;;
              esac
            else
              echo "* $line" >> others.txt
            fi
          done < raw_commits.txt

          echo "### Changelog (since last release)" > changelog.txt
          echo "" >> changelog.txt

          if [ -s feats.txt ]; then
            echo "#### 🚀 Features" >> changelog.txt
            cat feats.txt >> changelog.txt
            echo "" >> changelog.txt
          fi

          if [ -s fixes.txt ]; then
            echo "#### 🐛 Bug Fixes" >> changelog.txt
            cat fixes.txt >> changelog.txt
            echo "" >> changelog.txt
          fi

          if [ -s perfs.txt ]; then
            echo "#### ⚡ Performance" >> changelog.txt
            cat perfs.txt >> changelog.txt
            echo "" >> changelog.txt
          fi

          if [ -s refactors.txt ]; then
            echo "#### 🛠️ Refactoring & Style" >> changelog.txt
            cat refactors.txt >> changelog.txt
            echo "" >> changelog.txt
          fi

          if [ -s docs.txt ]; then
            echo "#### 📝 Documentation" >> changelog.txt
            cat docs.txt >> changelog.txt
            echo "" >> changelog.txt
          fi

          if [ -s builds.txt ]; then
            echo "#### ⚙️ Build & Chore" >> changelog.txt
            cat builds.txt >> changelog.txt
            echo "" >> changelog.txt
          fi

          if [ -s others.txt ]; then
            echo "#### ❓ Other Changes" >> changelog.txt
            cat others.txt >> changelog.txt
            echo "" >> changelog.txt
          fi

          rm -f raw_commits.txt feats.txt fixes.txt perfs.txt refactors.txt docs.txt builds.txt others.txt

          echo "Generated changelog:"
          cat changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          body_path: changelog.txt
          files: |
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
